name: Format Doctor core provider integration

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/register-doctor-core-provider
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"

      - run: bun install --frozen-lockfile
      - run: bun run format

      - name: Commit formatting
        run: |
          rm .github/workflows/format-doctor-core-provider.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Format Doctor core provider integration"
          git push origin HEAD:agent/register-doctor-core-provider
