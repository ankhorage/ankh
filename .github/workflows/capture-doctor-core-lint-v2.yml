name: Capture remaining Doctor core provider lint output

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/register-doctor-core-provider
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"
      - run: bun install --frozen-lockfile
      - run: bun run lint > lint-output.txt 2>&1 || true
      - name: Commit diagnostic
        run: |
          rm .github/workflows/capture-doctor-core-lint-v2.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Capture remaining Doctor core provider lint output"
          git push origin HEAD:agent/register-doctor-core-provider
