name: Fix Doctor core provider style

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/register-doctor-core-provider
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"
      - run: bun install --frozen-lockfile
      - run: bun run lint:fix
      - run: bun run format
      - name: Commit style fixes
        run: |
          rm -f lint-output.txt
          rm .github/workflows/fix-doctor-core-style.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Apply Doctor core provider style fixes"
          git push origin HEAD:agent/register-doctor-core-provider
